# Локальная БД для разработки. На VPS Бегета — свой Postgres (этот же образ/схема).
services:
  db:
    image: postgres:16-alpine
    container_name: kupec_db
    environment:
      POSTGRES_USER: kupec
      POSTGRES_PASSWORD: kupec
      POSTGRES_DB: kupec
    ports:
      # 5433 на хосте — чтобы не конфликтовать с локальным Postgres на 5432.
      - '5433:5432'
    volumes:
      - kupec_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kupec']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kupec_pg:
